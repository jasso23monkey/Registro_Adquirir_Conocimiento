<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA EXPERTO GASTRONÓMICO</title>
    <style>
        /* CSS: Diseño Mecatrónico y Limpio */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #252526; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .chat-box { height: 250px; overflow-y: auto; border: 1px solid #3e3e42; padding: 15px; margin-bottom: 20px; background: #1e1e1e; border-radius: 4px; }
        .bot-msg { color: #4ec9b0; margin-bottom: 10px; }
        .user-msg { color: #ce9178; text-align: right; margin-bottom: 10px; }
        input, select, button { background: #3c3c3c; color: white; border: 1px solid #555; padding: 10px; border-radius: 4px; }
        button { cursor: pointer; background: #007acc; transition: 0.3s; margin: 5px; }
        button:hover { background: #005a9e; }
        .hidden { display: none; }
        .grid-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin: 10px 0; background: #2d2d2d; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .section-title { color: #569cd6; border-bottom: 1px solid #3e3e42; margin-top: 20px; padding-bottom: 5px; }
        .flex-row { display: flex; gap: 20px; margin-top: 10px; }
        .flex-col { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 Sistema Experto: Adquisición de Conocimiento</h2>
        
        <div id="chatDisplay" class="chat-box"></div>

        <div id="faseEstado">
            <input type="text" id="inputEstado" placeholder="¿Cómo te encuentras hoy?" style="width: 70%;">
            <button onclick="procesarEstado()">Enviar</button>
        </div>

        <div id="menuPrincipal" class="hidden">
            <button onclick="mostrarConsulta()">1. Consultar Ingrediente</button>
            <button onclick="mostrarRegistro()">2. Ingresar Nuevo</button>
        </div>

        <div id="formRegistro" class="hidden">
            <h3 class="section-title">📝 Registro de Ingrediente</h3>
            <input type="text" id="regNombre" placeholder="Nombre (ej. Pollo, Res (Corte))" style="width: 97%;">
            
            <div class="flex-row">
                <div class="flex-col">
                    <label>Categoría:</label><br>
                    <select id="regCat" onchange="actualizarSubCat()" style="width: 100%;"></select>
                </div>
                <div class="flex-col">
                    <label>Subcategoría:</label><br>
                    <select id="regSubCat" style="width: 100%;"></select>
                </div>
            </div>

            <h4 class="section-title">🧪 Perfil Químico</h4>
            <label>Gustos Predominantes:</label>
            <div id="checkGustos" class="grid-options"></div>

            <div class="flex-row">
                <div class="flex-col">
                    <label><strong>Notas (CRUDO):</strong></label>
                    <div id="checkNotasCrudo" class="grid-options"></div>
                </div>
                <div class="flex-col">
                    <label><strong>Notas (COCIDO):</strong></label>
                    <div id="checkNotasCocido" class="grid-options"></div>
                </div>
            </div>

            <div class="flex-row">
                <div class="flex-col">
                    <label><strong>Texturas (CRUDO):</strong></label>
                    <div id="checkTexturasCrudo" class="grid-options"></div>
                </div>
                <div class="flex-col">
                    <label><strong>Texturas (COCIDO):</strong></label>
                    <div id="checkTexturasCocido" class="grid-options"></div>
                </div>
            </div>

            <div style="margin-top: 20px; text-align: center;">
                <button onclick="enviarIngrediente()" style="background: #28a745; padding: 15px 30px;">Guardar en JSON</button>
                <button onclick="volverMenu()" style="background:#555; padding: 15px 30px;">Cancelar</button>
            </div>
        </div>

        <div id="areaConsulta" class="hidden">
            <h3 class="section-title">🔍 Consulta de Base de Datos</h3>
            <div id="listaIngredientes" style="margin-bottom: 20px; line-height: 2em;"></div>
            <button onclick="volverMenu()" style="background:#555">Volver al Menú</button>
        </div>
    </div>

    <script>
        let configGlobal = {};
        let interfazGlobal = {};

        // Carga inicial de datos desde Flask
        window.onload = async () => {
            const resConf = await fetch('/get_config');
            configGlobal = await resConf.json();
            
            const resInt = await fetch('/get_interfaz');
            interfazGlobal = await resInt.json();

            const display = document.getElementById('chatDisplay');
            interfazGlobal.mensajes_bienvenida.forEach(m => {
                display.innerHTML += `<div class="bot-msg">Bot: ${m}</div>`;
            });
            display.innerHTML += `<div class="bot-msg">Bot: Antes de empezar, ¿cómo te encuentras el día de hoy?</div>`;
        };

        async function procesarEstado() {
            const input = document.getElementById('inputEstado').value.toLowerCase();
            if (!input) return;
            
            const display = document.getElementById('chatDisplay');
            display.innerHTML += `<div class="user-msg">${input}</div>`;

            let r = interfazGlobal.respuestas_estado;
            let msg = input.includes('bien') ? r.bien : (input.includes('mal') ? r.mal : r.desconocido);
            
            display.innerHTML += `<div class="bot-msg">${msg}</div>`;
            document.getElementById('faseEstado').classList.add('hidden');
            document.getElementById('menuPrincipal').classList.remove('hidden');
        }

        function mostrarRegistro() {
            document.getElementById('menuPrincipal').classList.add('hidden');
            document.getElementById('formRegistro').classList.remove('hidden');
            
            // Llenar categorías
            const catSelect = document.getElementById('regCat');
            catSelect.innerHTML = configGlobal.cat_sistema.map(c => `<option value="${c}">${c}</option>`).join('');
            actualizarSubCat();

            // Generar todos los cuadros de selección
            generarChecks('checkGustos', configGlobal.gustos);
            generarChecks('checkNotasCrudo', configGlobal.notas);
            generarChecks('checkNotasCocido', configGlobal.notas);
            generarChecks('checkTexturasCrudo', configGlobal.texturas);
            generarChecks('checkTexturasCocido', configGlobal.texturas);
        }

        function actualizarSubCat() {
            const catPrincipal = document.getElementById('regCat').value;
            const subSelect = document.getElementById('regSubCat');
            const opciones = configGlobal.sub_cat[catPrincipal] || [];
            subSelect.innerHTML = opciones.map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function generarChecks(containerId, lista) {
            const container = document.getElementById(containerId);
            container.innerHTML = lista.map(item => `
                <label style="display: block;">
                    <input type="checkbox" value="${item}"> ${item}
                </label>
            `).join('');
        }

        async function enviarIngrediente() {
            const nombre = document.getElementById('regNombre').value.trim();
            if (!nombre) { alert("Por favor, ingresa un nombre."); return; }

            const data = {
                nombre: nombre,
                taxonomia: { 
                    categoria: document.getElementById('regCat').value, 
                    subcategoria: document.getElementById('regSubCat').value 
                },
                quimica: {
                    gustos: getChecked('checkGustos'),
                    sensaciones: [], 
                    intensidad: "Media"
                },
                // Captura de ambos estados
                notas_estado: { 
                    crudo: getChecked('checkNotasCrudo'), 
                    cocido: getChecked('checkNotasCocido') 
                },
                textura_estado: { 
                    crudo: getChecked('checkTexturasCrudo'), 
                    cocido: getChecked('checkTexturasCocido') 
                }
            };

            const res = await fetch('/guardar_ingrediente', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await res.json();
            alert(result.message);
            volverMenu();
        }

        function getChecked(id) {
            return Array.from(document.querySelectorAll(`#${id} input:checked`)).map(c => c.value);
        }

        function volverMenu() {
            document.getElementById('formRegistro').classList.add('hidden');
            document.getElementById('areaConsulta').classList.add('hidden');
            document.getElementById('menuPrincipal').classList.remove('hidden');
            // Limpiar inputs
            document.getElementById('regNombre').value = "";
        }

        async function mostrarConsulta() {
            document.getElementById('menuPrincipal').classList.add('hidden');
            document.getElementById('areaConsulta').classList.remove('hidden');
    
            const res = await fetch('/get_conocimiento');
            const data = await res.json();
            const nombres = Object.keys(data);
            const contenedor = document.getElementById('listaIngredientes');
    
            if (nombres.length > 0) {
                // Generamos un botón por cada ingrediente registrado
                contenedor.innerHTML = nombres.map(n => 
                `<button onclick="verPerfil('${n}')" style="margin:5px; background:#444;">${n}</button>`
                ).join('');
            } else {
            contenedor.innerHTML = "No hay ingredientes registrados aún.";
            }
        }
        async function verPerfil(nombre) {
            const res = await fetch('/get_conocimiento');
            const data = await res.json();
            const ing = data[nombre];
            const display = document.getElementById('chatDisplay');

            // Volvemos al menú para ver el chat
            volverMenu();

            // Construimos el mensaje con el "ADN" del ingrediente
            let informe = `
                <div class="bot-msg">
                <strong>📊 PERFIL TÉCNICO: ${nombre.toUpperCase()}</strong><br>
                • Categoría: ${ing.taxonomia.categoria} (${ing.taxonomia.subcategoria})<br>
                • Gustos: ${ing.quimica.gustos.join(', ') || 'Ninguno'}<br><br>
                <strong>🧪 EVOLUCIÓN (CRUDO vs COCIDO):</strong><br>
                • Notas: [${ing.notas_estado.crudo}] → [${ing.notas_estado.cocido}]<br>
                • Textura: [${ing.textura_estado.crudo}] → [${ing.textura_estado.cocido}]
            </div>
            `;

        display.innerHTML += `<div class="user-msg">Consultar: ${nombre}</div>`;
        display.innerHTML += informe;
    
        // Auto-scroll al final del chat
        display.scrollTop = display.scrollHeight;
        }

    </script>
</body>
</html>
